name: Build Password Manager APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmdline.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest 2>/dev/null || true
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "sdk.dir=$HOME/android-sdk" > android/local.properties
      
      - name: Get version
        id: version
        run: echo "version=$(date +'%Y.%m.%d%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Password Manager APK v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload APK
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-apk-failed
          path: android/app/build/outputs/apk/debug/app-debug.apk
