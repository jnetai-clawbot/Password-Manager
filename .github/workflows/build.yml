name: Build & Release Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Debug Keystore for Signing
        working-directory: android/app
        run: |
          # Use the persistent release.keystore from the repo
          if [ ! -f release.keystore ]; then
            echo "ERROR: release.keystore not found in repo!"
            exit 1
          fi
          echo "Using persistent release.keystore from repo"

      - name: Get version
        id: version
        run: echo "version=$(date +'%Y.%m.%d%H%M')" >> $GITHUB_OUTPUT

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: JNet2026PM
          KEY_ALIAS: release
          KEY_PASSWORD: JNet2026PM
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m" --stacktrace

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/release/
          file android/app/build/outputs/apk/release/app-release.apk

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/Password-Manager.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Password Manager v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/release/Password-Manager.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Password-Manager-APK
          path: android/app/build/outputs/apk/release/Password-Manager.apk