name: Build Password Manager APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: |
            ~/.android/sdk
            ~/android-sdk
          key: android-sdk-34
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: "34.0.0"
      
      - name: Create local.properties
        run: |
          if [ -d "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          elif [ -d "$HOME/.android/sdk" ]; then
            echo "sdk.dir=$HOME/.android/sdk" > local.properties
          fi
          cat local.properties
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon 2>&1 | tail -100
      
      - name: Create apk directory
        run: mkdir -p apk
      
      - name: Copy APK
        run: |
          if [ -d app/build/outputs/apk/debug ]; then
            cp app/build/outputs/apk/debug/*.apk apk/ 2>/dev/null || true
          fi
          find app/build -name "*.apk" -exec cp {} apk/ \; 2>/dev/null || true
          ls -la apk/ || echo "No APK"
      
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-apk
          path: apk/*.apk
          retention-days: 7
