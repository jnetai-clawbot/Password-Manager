name: Build Password Manager APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK with wget
        run: |
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
          unzip -q cmdline.zip
          mv cmdline-tools latest
          ls -la latest/bin/
      
      - name: Accept licenses and install SDK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
        run: |
          export ANDROID_HOME=${{ github.workspace }}/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -10
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=${{ github.workspace }}/android-sdk" > local.properties
          cat local.properties
      
      - name: Build APK
        run: |
          export ANDROID_HOME=${{ github.workspace }}/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon 2>&1 | tail -100
      
      - name: Create apk directory
        run: mkdir -p apk
      
      - name: Copy APK
        run: |
          if ls app/build/outputs/apk/debug/*.apk 2>/dev/null; then
            cp app/build/outputs/apk/debug/*.apk apk/
          else
            find app/build -name "*.apk" -exec cp {} apk/ \; 2>/dev/null || echo "No APK"
          fi
          ls -la apk/
      
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-apk
          path: apk/*.apk
