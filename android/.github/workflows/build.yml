name: Build Password Manager APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-17-jdk -qq > /dev/null 2>&1

      - name: Download Android command line tools
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
          unzip -q cmdline.zip
          mkdir -p ~/android-sdk/cmdline-tools
          mv cmdline-tools ~/android-sdk/cmdline-tools/latest

      - name: Install Android SDK
        run: |
          export ANDROID_HOME=~/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$HOME/android-sdk" > local.properties

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon 2>&1 | tail -80

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-apk
          path: app/build/outputs/apk/debug/*.apk
