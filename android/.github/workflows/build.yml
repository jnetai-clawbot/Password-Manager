name: Build Password Manager APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | tail -80
      
      - name: Create apk directory
        run: mkdir -p apk
      
      - name: Copy APK
        run: |
          if [ -f app/build/outputs/apk/debug/*.apk ]; then
            cp app/build/outputs/apk/debug/*.apk apk/
            ls -la apk/
          else
            echo "APK not found - checking build output"
            ls -la app/build/ 2>/dev/null || echo "No build dir"
          fi
      
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-apk
          path: apk/*.apk
