name: Build Password Manager APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        run: |
          cd /home/user
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p android-sdk/cmdline-tools/latest
          mv cmdline-tools/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          export ANDROID_HOME=/home/user/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -5
          echo "SDK setup complete"
      
      - name: Build APK
        env:
          ANDROID_HOME: /home/user/android-sdk
        run: |
          export ANDROID_HOME=/home/user/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | tail -100
      
      - name: Create apk directory
        run: mkdir -p apk
      
      - name: Copy APK
        run: |
          if [ -f app/build/outputs/apk/debug/*.apk ]; then
            cp app/build/outputs/apk/debug/*.apk apk/
            ls -la apk/
          else
            echo "APK not found - checking build output"
            ls -la app/build/ 2>/dev/null || echo "No build dir"
          fi
      
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-apk
          path: apk/*.apk
