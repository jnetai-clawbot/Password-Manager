name: Build Password Manager APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: mobile-devops/action-sdk@v3
        with:
          android: 'true'
          androidsdk: '34'
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon 2>&1 | tail -60

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-debug
          path: app/build/outputs/apk/debug/*.apk
